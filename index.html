<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦄 Ükssarvik & Sõõrikud</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    width:100%; height:100%;
    background:#0d0020;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family:'Nunito',sans-serif;
    overflow:hidden; user-select:none;
  }
  #gameWrapper { position:relative; display:flex; flex-direction:column; align-items:center; gap:10px; }
  #hud {
    display:flex; align-items:center; gap:20px; width:100%;
    padding:8px 16px; background:rgba(255,255,255,0.07);
    border-radius:20px; border:1px solid rgba(255,255,255,0.15);
  }
  #score { font-family:'Fredoka One',cursive; font-size:22px; color:#fff; text-shadow:0 0 10px #ff80ff; flex:0 0 auto; white-space:nowrap; }
  .meter-wrap { display:flex; flex-direction:column; gap:3px; flex:1; }
  .meter-label { font-size:10px; font-weight:900; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.6); }
  .meter-bar { height:14px; border-radius:10px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); overflow:hidden; }
  #sugarFill { height:100%; width:0%; background:linear-gradient(90deg,#ff6eb4,#ff3366); border-radius:10px; transition:width 0.2s,background 0.3s; box-shadow:0 0 8px #ff3366; }
  #healthFill { height:100%; width:100%; background:linear-gradient(90deg,#4ade80,#22c55e); border-radius:10px; transition:width 0.2s; box-shadow:0 0 8px #22c55e; }
  #fullscreenBtn { flex:0 0 auto; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; font-size:20px; width:36px; height:36px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
  #fullscreenBtn:hover { background:rgba(255,255,255,0.2); }
  canvas { border-radius:20px; border:2px solid rgba(255,255,255,0.1); box-shadow:0 0 60px rgba(180,0,255,0.3),0 0 120px rgba(255,0,128,0.15); display:block; }
  #overlay { position:absolute; left:0; border-radius:20px; background:rgba(10,0,25,0.88); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:10; backdrop-filter:blur(6px); }
  #overlay h1 { font-family:'Fredoka One',cursive; font-size:clamp(30px,6vw,52px); background:linear-gradient(135deg,#ff80ff,#ffcc00,#80ffff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; line-height:1.1; }
  #overlay p { color:rgba(255,255,255,0.75); font-size:clamp(12px,1.8vw,15px); text-align:center; max-width:440px; line-height:1.7; padding:0 20px; }
  #startBtn { margin-top:6px; padding:13px 42px; font-family:'Fredoka One',cursive; font-size:clamp(17px,2.5vw,22px); color:#1a0533; background:linear-gradient(135deg,#ff80ff,#ffcc00); border:none; border-radius:50px; cursor:pointer; box-shadow:0 4px 20px rgba(255,128,255,0.4); transition:transform 0.1s,box-shadow 0.1s; }
  #startBtn:hover { transform:scale(1.06); box-shadow:0 6px 28px rgba(255,128,255,0.6); }
  #startBtn:active { transform:scale(0.97); }
  #finalScore { font-family:'Fredoka One',cursive; font-size:clamp(18px,3vw,28px); color:#ffcc00; text-shadow:0 0 12px #ffcc00; display:none; }
  #controls { color:rgba(255,255,255,0.35); font-size:clamp(10px,1.3vw,12px); letter-spacing:0.5px; }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="hud">
    <div id="score">⭐ 0</div>
    <div id="bestscore" style="font-family:'Fredoka One',cursive;font-size:15px;color:rgba(255,220,80,0.85);text-shadow:0 0 8px #ffcc00;flex:0 0 auto;white-space:nowrap;">🏆 0</div>
    <div class="meter-wrap">
      <div class="meter-label">🍩 Suhkur</div>
      <div class="meter-bar"><div id="sugarFill"></div></div>
    </div>
    <div class="meter-wrap">
      <div class="meter-label">💚 Tervis</div>
      <div class="meter-bar"><div id="healthFill"></div></div>
    </div>
    <button id="fullscreenBtn" title="Täisekraan (F)">⛶</button>
  </div>
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>🦄 Ükssarvik<br>&amp; Sõõrikud</h1>
    <p>Aja sõõrikuid taga, aga ära söö liiga palju – muidu lõhked!<br>
    Söö <b style="color:#ff9">🥕 porgandeid</b> ja <b style="color:#8f8">🌿 salatit</b>, et suhkrut tasakaalustada.</p>
    <p style="font-size:clamp(11px,1.5vw,13px);color:rgba(255,255,255,0.55)">
      <b style="color:#88bbff">Komeet</b> – lendab läbi &nbsp;|&nbsp;
      <b style="color:#ff6666">Nõiapall</b> – põrkab seintelt &nbsp;|&nbsp;
      <b style="color:#bbccff">Kummitus</b> – ajab taga
    </p>
    <div id="finalScore"></div>
    <div id="bestScoreOverlay" style="display:none;font-family:'Fredoka One',cursive;font-size:clamp(14px,2vw,20px);color:#ffcc00;opacity:0.85;"></div>
    <button id="startBtn">Mängima! ✨</button>
    <div id="controls">← → ↑ ↓ või WASD liikumiseks &nbsp;|&nbsp; F = täisekraan</div>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const sugarFill=document.getElementById('sugarFill');
const healthFill=document.getElementById('healthFill');
const scoreEl=document.getElementById('score');
const bestScoreEl=document.getElementById('bestscore');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const finalScoreEl=document.getElementById('finalScore');
const bestScoreOverlay=document.getElementById('bestScoreOverlay');
const fsBtn=document.getElementById('fullscreenBtn');
const hud=document.getElementById('hud');

let bestScore=parseInt(localStorage.getItem('unicornBestScore')||'0');
bestScoreEl.textContent='🏆 '+bestScore;

let W=800,H=600;

function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const aW=isFS?vw:vw-20, aH=isFS?vh:vh-20;
  const sc=Math.min(aW/W,(aH-60)/H,2);
  canvas.style.width=(W*sc)+'px'; canvas.style.height=(H*sc)+'px';
  hud.style.width=(W*sc)+'px';
  overlay.style.width=(W*sc)+'px'; overlay.style.height=(H*sc)+'px';
  overlay.style.top='52px';
  canvas.width=W; canvas.height=H;
}
window.addEventListener('resize',resize); resize();

function toggleFS(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)
    (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement);
  else (document.exitFullscreen||document.webkitExitFullscreen).call(document);
}
fsBtn.addEventListener('click',toggleFS);
document.addEventListener('fullscreenchange',()=>{resize();fsBtn.textContent=document.fullscreenElement?'x':'⛶';});
document.addEventListener('webkitfullscreenchange',()=>resize());

const stars=Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,a:Math.random(),speed:Math.random()*0.008+0.003}));

let state='menu';
let unicorn,items,hazards,particles,score,sugar,health,gameTime,spawnTimer,spawnRate,hazardTimer,hazardRate;
const keys={};

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(e.key==='f'||e.key==='F') toggleFS();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
startBtn.addEventListener('click',startGame);

function startGame(){
  overlay.style.display='none'; finalScoreEl.style.display='none';
  bestScoreOverlay.style.display='none';
  overlay.querySelector('h1').textContent='🦄 Ükssarvik & Sõõrikud';
  startBtn.textContent='Mängima! ✨';
  state='playing'; score=0; sugar=0; health=100;
  gameTime=0; spawnTimer=0; spawnRate=120;
  hazardTimer=0; hazardRate=300;
  particles=[]; items=[]; hazards=[];
  unicorn={x:W/2,y:H/2,vx:0,vy:0,size:28,trail:[],angle:0,blinkTimer:0,exploding:false,explodeT:0,invincible:0,hitFlash:0};
  for(let i=0;i<6;i++) spawnItem();
  loop();
}

function spawnItem(){
  const types=['donut','donut','donut','carrot','salad','carrot'];
  const type=types[Math.floor(Math.random()*types.length)];
  const m=50;
  items.push({x:m+Math.random()*(W-m*2),y:m+Math.random()*(H-m*2),type,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.04+Math.random()*0.02,collected:false,scale:0,rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.03});
}

function spawnHazard(){
  const types=['comet','comet','bouncer','chaser'];
  const type=types[Math.floor(Math.random()*types.length)];
  let h={type,rotation:0};
  if(type==='comet'){
    const side=Math.floor(Math.random()*4);
    const spd=4+Math.random()*3;
    if(side===0){h.x=Math.random()*W;h.y=-30;h.vx=(Math.random()-0.5)*2;h.vy=spd;}
    else if(side===1){h.x=W+30;h.y=Math.random()*H;h.vx=-spd;h.vy=(Math.random()-0.5)*2;}
    else if(side===2){h.x=Math.random()*W;h.y=H+30;h.vx=(Math.random()-0.5)*2;h.vy=-spd;}
    else{h.x=-30;h.y=Math.random()*H;h.vx=spd;h.vy=(Math.random()-0.5)*2;}
    h.radius=13; h.trail=[];
    h.color=['#88aaff','#aaddff','#ffaadd','#aaffcc','#ffffaa'][Math.floor(Math.random()*5)];
    h.rotSpeed=0.07+Math.random()*0.07;
  } else if(type==='bouncer'){
    h.x=Math.random()>0.5?-20:W+20; h.y=50+Math.random()*(H-100);
    const spd=2.2+Math.random()*1.8;
    h.vx=(h.x<0?1:-1)*spd; h.vy=(Math.random()-0.5)*spd*1.6;
    h.radius=15; h.spikes=8; h.rotSpeed=0.05+Math.random()*0.04; h.pulseT=0;
  } else {
    const side=Math.floor(Math.random()*4);
    if(side===0){h.x=Math.random()*W;h.y=-40;}
    else if(side===1){h.x=W+40;h.y=Math.random()*H;}
    else if(side===2){h.x=Math.random()*W;h.y=H+40;}
    else{h.x=-40;h.y=Math.random()*H;}
    h.vx=0; h.vy=0; h.radius=18; h.wobble=0; h.eyeT=0; h.rotSpeed=0;
  }
  hazards.push(h);
}

function addParticle(x,y,color,count){
  count=count||8;
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,color,life:1,size:3+Math.random()*5,type:Math.random()<0.5?'circle':'star'});
  }
}
function addBigExplosion(x,y){
  const colors=['#ff3366','#ff9900','#ffff00','#ff66ff','#ffffff','#ff6699'];
  for(let i=0;i<80;i++){
    const a=Math.random()*Math.PI*2,spd=1+Math.random()*10;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,color:colors[i%colors.length],life:1,size:4+Math.random()*14,type:['circle','star','heart'][Math.floor(Math.random()*3)]});
  }
}
function addHitSparks(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,spd=2+Math.random()*7;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,color:['#ff2222','#ff8800','#ffffff'][Math.floor(Math.random()*3)],life:1,size:4+Math.random()*7,type:Math.random()<0.5?'circle':'star'});
  }
}

function drawStarShape(cx,cy,r,color,rot){
  rot=rot||0;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
  ctx.beginPath();
  for(let i=0;i<5;i++){const a=(i*2*Math.PI/5)-Math.PI/2,b=a+Math.PI/5;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.lineTo(Math.cos(b)*r*0.4,Math.sin(b)*r*0.4);}
  ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.restore();
}
function drawHeart(cx,cy,sz,color){
  ctx.save(); ctx.translate(cx,cy);
  ctx.beginPath(); ctx.moveTo(0,sz*0.4);
  ctx.bezierCurveTo(-sz*0.6,-sz*0.1,-sz*0.8,sz*0.8,0,sz*1.1);
  ctx.bezierCurveTo(sz*0.8,sz*0.8,sz*0.6,-sz*0.1,0,sz*0.4);
  ctx.fillStyle=color; ctx.fill(); ctx.restore();
}
function drawDonut(x,y,sz,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.beginPath(); ctx.arc(0,0,sz,0,Math.PI*2); ctx.fillStyle='#ff9eb5'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,0,sz*0.38,0,Math.PI*2); ctx.fillStyle='#1a0533'; ctx.fill();
  const gc=['#ff6eb4','#ff9900','#ffcc00'];
  ctx.beginPath(); ctx.arc(0,0,sz*0.95,-Math.PI*0.2,Math.PI*0.8); ctx.arc(0,0,sz*0.42,Math.PI*0.8,-Math.PI*0.2,true); ctx.closePath();
  ctx.fillStyle=gc[Math.floor(Math.abs(x+y))%3]; ctx.fill();
  const sp=['#ff3366','#33ccff','#ffff00','#ff99ff','#00ff99'];
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+0.3,r=sz*0.65;ctx.save();ctx.translate(Math.cos(a)*r,Math.sin(a)*r);ctx.rotate(a+Math.PI/4);ctx.fillStyle=sp[i%sp.length];ctx.fillRect(-sz*0.12,-sz*0.04,sz*0.24,sz*0.08);ctx.restore();}
  ctx.restore();
}
function drawCarrot(x,y,sz,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.beginPath(); ctx.moveTo(0,-sz); ctx.bezierCurveTo(sz*0.5,-sz*0.5,sz*0.4,sz*0.5,0,sz); ctx.bezierCurveTo(-sz*0.4,sz*0.5,-sz*0.5,-sz*0.5,0,-sz);
  ctx.fillStyle='#ff7a00'; ctx.fill();
  ctx.strokeStyle='rgba(255,140,0,0.6)'; ctx.lineWidth=1.5;
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*sz*0.25,-sz*0.5);ctx.lineTo(i*sz*0.15,sz*0.5);ctx.stroke();}
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(i*sz*0.15,-sz);ctx.bezierCurveTo(i*sz*0.8,-sz*1.5,i*sz*0.5,-sz*2,i*sz*0.1,-sz*1.8);ctx.strokeStyle='#4ade80';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();}
  ctx.restore();
}
function drawSalad(x,y,sz,rot){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  [{a:-0.8,r:sz*0.5,c:'#4ade80'},{a:0.8,r:sz*0.5,c:'#22c55e'},{a:0,r:sz*0.6,c:'#86efac'},{a:-0.3,r:sz*0.45,c:'#16a34a'},{a:0.5,r:sz*0.4,c:'#4ade80'}].forEach(l=>{
    ctx.beginPath(); ctx.ellipse(Math.cos(l.a)*l.r*0.6,Math.sin(l.a)*l.r*0.6,l.r,l.r*0.5,l.a,0,Math.PI*2); ctx.fillStyle=l.c; ctx.fill();
  });
  ctx.restore();
}

// ── HAZARD DRAW ──
function drawComet(h){
  // Trail
  for(let i=0;i<h.trail.length-1;i++){
    const t=h.trail[i],n=h.trail[i+1];
    const a=(1-i/h.trail.length)*0.55;
    ctx.beginPath(); ctx.moveTo(t.x,t.y); ctx.lineTo(n.x,n.y);
    ctx.globalAlpha=a; ctx.strokeStyle=h.color;
    ctx.lineWidth=(h.trail.length-i)*2; ctx.lineCap='round'; ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Glow
  ctx.save(); ctx.translate(h.x,h.y);
  const g=ctx.createRadialGradient(0,0,0,0,0,h.radius*3);
  g.addColorStop(0,h.color); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(0,0,h.radius*3,0,Math.PI*2);
  ctx.fillStyle=g; ctx.globalAlpha=0.35; ctx.fill(); ctx.globalAlpha=1;
  drawStarShape(0,0,h.radius,h.color,h.rotation);
  // inner bright dot
  ctx.beginPath(); ctx.arc(0,0,h.radius*0.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
  ctx.restore();
}

function drawBouncer(h){
  ctx.save(); ctx.translate(h.x,h.y); ctx.rotate(h.rotation);
  const r=h.radius, pulse=0.88+Math.sin(h.pulseT)*0.12;
  // outer glow
  const g=ctx.createRadialGradient(0,0,0,0,0,r*2.5);
  g.addColorStop(0,'rgba(255,50,50,0.5)'); g.addColorStop(1,'rgba(200,0,0,0)');
  ctx.beginPath(); ctx.arc(0,0,r*2.5,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  // spiky body
  ctx.beginPath();
  const spk=h.spikes;
  for(let i=0;i<spk*2;i++){
    const a=(i/(spk*2))*Math.PI*2, rad=i%2===0?r*pulse:r*0.5*pulse;
    i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  ctx.closePath();
  const sg=ctx.createRadialGradient(0,0,0,0,0,r);
  sg.addColorStop(0,'#ff7777'); sg.addColorStop(1,'#aa0000');
  ctx.fillStyle=sg; ctx.fill();
  ctx.strokeStyle='#ff2200'; ctx.lineWidth=1.5; ctx.stroke();
  // face
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-r*0.28,-r*0.18,r*0.15,r*0.19,0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r*0.28,-r*0.18,r*0.15,r*0.19,-0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-r*0.28,-r*0.16,r*0.08,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.28,-r*0.16,r*0.08,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-r*0.44,-r*0.35); ctx.lineTo(-r*0.1,-r*0.26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.44,-r*0.35); ctx.lineTo(r*0.1,-r*0.26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r*0.28,r*0.22); ctx.lineTo(0,r*0.08); ctx.lineTo(r*0.28,r*0.22); ctx.stroke();
  ctx.restore();
}

function drawChaser(h){
  ctx.save(); ctx.translate(h.x,h.y);
  const r=h.radius, w=h.wobble, t=h.eyeT;
  // glow
  const g=ctx.createRadialGradient(0,0,0,0,0,r*2.2);
  g.addColorStop(0,'rgba(180,200,255,0.22)'); g.addColorStop(1,'rgba(80,80,200,0)');
  ctx.beginPath(); ctx.arc(0,0,r*2.2,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  // body
  ctx.beginPath(); ctx.arc(0,-r*0.15,r*0.88,Math.PI,0);
  const wd=Math.sin(w)*r*0.18;
  ctx.bezierCurveTo(r*0.88,r*0.5,r*0.62,r*0.82+wd,r*0.34,r*0.54);
  ctx.bezierCurveTo(r*0.18,r*0.28,-r*0.18,r*0.28,-r*0.34,r*0.54);
  ctx.bezierCurveTo(-r*0.62,r*0.82-wd,-r*0.88,r*0.5,-r*0.88,r*0.04);
  ctx.closePath();
  const bg=ctx.createLinearGradient(0,-r,0,r);
  bg.addColorStop(0,'#dde8ff'); bg.addColorStop(1,'#8899cc');
  ctx.fillStyle=bg; ctx.globalAlpha=0.88; ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(200,220,255,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
  // red glowing eyes
  [-r*0.3,r*0.3].forEach(ex=>{
    const eg=ctx.createRadialGradient(ex,-r*0.14,0,ex,-r*0.14,r*0.28);
    eg.addColorStop(0,'rgba(255,60,60,0.85)'); eg.addColorStop(1,'rgba(200,0,0,0)');
    ctx.beginPath(); ctx.arc(ex,-r*0.14,r*0.28,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();
    ctx.beginPath(); ctx.arc(ex,-r*0.14,r*0.14,0,Math.PI*2); ctx.fillStyle='#ff3333'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex+Math.sin(t*0.05)*r*0.04,-r*0.14,r*0.065,0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill();
  });
  ctx.restore();
}

function drawUnicorn(u){
  if(u.exploding) return;
  ctx.save(); ctx.translate(u.x,u.y);
  if(u.invincible>0&&Math.floor(u.invincible/5)%2===0) ctx.globalAlpha=0.25;
  const moving=Math.abs(u.vx)+Math.abs(u.vy)>0.1;
  const angle=moving?Math.atan2(u.vy,u.vx):u.angle;
  u.angle=angle; ctx.rotate(angle+Math.PI/2);
  const s=u.size,t=gameTime;
  // tail
  ['#ff80ff','#ff9933','#ffff66','#66ffcc','#66aaff'].forEach((c,i)=>{
    const ta=-0.4+i*0.2+Math.sin(t*0.08+i)*0.3, tl=s*0.8+Math.sin(t*0.07+i*1.3)*s*0.2;
    ctx.beginPath(); ctx.moveTo(0,s*0.7);
    ctx.quadraticCurveTo(Math.cos(ta+Math.PI/2)*s*0.6,s*0.7+tl*0.5,Math.cos(ta+Math.PI/2)*s*0.4+Math.cos(ta)*s*0.3,s*0.7+tl);
    ctx.strokeStyle=c; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
  });
  ctx.beginPath(); ctx.ellipse(0,0,s*0.55,s*0.72,0,0,Math.PI*2);
  ctx.fillStyle=u.hitFlash>0?'#ffcccc':'#fff5f9'; ctx.fill();
  ctx.strokeStyle='rgba(255,150,200,0.4)'; ctx.lineWidth=1; ctx.stroke();
  const la=Math.sin(t*0.12)*0.3;
  [[-0.3,0.6],[0.3,0.6],[-0.25,0.4+la],[0.25,0.4-la]].forEach(([lx,ly],i)=>{
    ctx.beginPath(); ctx.moveTo(lx*s,ly*s);
    const le=i>=2?ly*s+s*0.45:ly*s+s*0.4;
    ctx.lineTo(lx*s+(i>=2?la*s*0.15:0),le);
    ctx.strokeStyle='#f8d7e3'; ctx.lineWidth=s*0.22; ctx.lineCap='round'; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(lx*s+(i>=2?la*s*0.15:0),le,s*0.1,s*0.07,0,0,Math.PI*2);
    ctx.fillStyle='#e879a0'; ctx.fill();
  });
  ctx.beginPath(); ctx.ellipse(0,-s*0.7,s*0.35,s*0.42,0,0,Math.PI*2); ctx.fillStyle='#fff0f5'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.08,-s*0.5,s*0.18,s*0.14,0.3,0,Math.PI*2); ctx.fillStyle='#ffd6e7'; ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.04,-s*0.5,s*0.04,0,Math.PI*2); ctx.arc(s*0.16,-s*0.5,s*0.04,0,Math.PI*2); ctx.fillStyle='#f472b6'; ctx.fill();
  if(u.blinkTimer>0){
    ctx.beginPath(); ctx.moveTo(-s*0.1,-s*0.78); ctx.lineTo(s*0.08,-s*0.78);
    ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke(); u.blinkTimer--;
  } else {
    ctx.beginPath(); ctx.arc(-s*0.02,-s*0.78,s*0.1,0,Math.PI*2); ctx.fillStyle='#1a0533'; ctx.fill();
    ctx.beginPath(); ctx.arc(s*0.04,-s*0.82,s*0.04,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.beginPath(); ctx.arc(-s*0.02,-s*0.78,s*0.04,0,Math.PI*2); ctx.fillStyle='#c084fc'; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(-s*0.18,-s*0.62,s*0.1,0,Math.PI*2); ctx.arc(s*0.22,-s*0.62,s*0.1,0,Math.PI*2);
  ctx.fillStyle='rgba(255,150,180,0.35)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-s*0.28,-s*0.95); ctx.lineTo(-s*0.18,-s*1.2); ctx.lineTo(-s*0.05,-s*0.92); ctx.closePath(); ctx.fillStyle='#fff0f5'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-s*0.22,-s*0.98); ctx.lineTo(-s*0.18,-s*1.12); ctx.lineTo(-s*0.08,-s*0.95); ctx.closePath(); ctx.fillStyle='#ffd6e7'; ctx.fill();
  const hg=ctx.createLinearGradient(0,-s*1.0,0,-s*1.55);
  hg.addColorStop(0,'#ff80ff'); hg.addColorStop(0.33,'#ffcc00'); hg.addColorStop(0.66,'#80ffff'); hg.addColorStop(1,'#ff80aa');
  ctx.beginPath(); ctx.moveTo(-s*0.08,-s*1.0); ctx.lineTo(0,-s*1.55); ctx.lineTo(s*0.08,-s*1.0); ctx.closePath();
  ctx.fillStyle=hg; ctx.fill();
  for(let i=1;i<=3;i++){const hy=-s*1.0-(i/4)*s*0.55,hw=s*0.08*(1-(i/4)*0.7);ctx.beginPath();ctx.moveTo(-hw,hy);ctx.lineTo(hw,hy);ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();}
  ['#ff80ff','#ffcc00','#80ffff','#ff9966'].forEach((c,i)=>{
    const ma=Math.sin(t*0.06+i*0.8)*0.2;
    ctx.beginPath(); ctx.moveTo(-s*0.28+i*s*0.06,-s*0.85);
    ctx.bezierCurveTo(-s*0.6+ma*s*0.3+i*s*0.04,-s*0.6,-s*0.55+ma*s*0.2+i*s*0.04,-s*0.1,-s*0.35+i*s*0.04,s*0.2);
    ctx.strokeStyle=c; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  });
  if(Math.sin(t*0.15)>0.5){ctx.save();ctx.translate(0,-s*1.55);drawStarShape(0,0,s*0.18,'#fff',t*0.1);ctx.restore();}
  ctx.globalAlpha=1;
  ctx.restore();
}

let animId=null;
function loop(){
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
  update(); draw();
}

function update(){
  if(state!=='playing') return;
  gameTime++;
  stars.forEach(s=>s.a=0.3+Math.abs(Math.sin(gameTime*s.speed))*0.7);

  if(unicorn.exploding){
    unicorn.explodeT++;
    if(unicorn.explodeT>90){
      state='gameover';
      const finalPts=Math.floor(score/10);
      const isNew=finalPts>bestScore;
      if(isNew){ bestScore=finalPts; localStorage.setItem('unicornBestScore',bestScore); bestScoreEl.textContent='🏆 '+bestScore; }
      overlay.style.display='flex';
      startBtn.textContent='Uuesti! 🦄';
      finalScoreEl.style.display='block';
      finalScoreEl.textContent='⭐ Skoor: '+finalPts;
      bestScoreOverlay.style.display='block';
      bestScoreOverlay.textContent=isNew?'🏆 Uus rekord!':'🏆 Parim: '+bestScore;
      bestScoreOverlay.style.color=isNew?'#ffe066':'rgba(255,204,0,0.75)';
      overlay.querySelector('h1').textContent='💥 Lõhkesid!';
    }
    return;
  }

  const spd=3.8; let ax=0,ay=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) ax-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) ax+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) ay-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) ay+=1;
  if(ax!==0||ay!==0){const l=Math.sqrt(ax*ax+ay*ay);ax/=l;ay/=l;}
  unicorn.vx=unicorn.vx*0.8+ax*spd*0.7;
  unicorn.vy=unicorn.vy*0.8+ay*spd*0.7;
  unicorn.x=Math.max(32,Math.min(W-32,unicorn.x+unicorn.vx));
  unicorn.y=Math.max(32,Math.min(H-32,unicorn.y+unicorn.vy));
  unicorn.trail.unshift({x:unicorn.x,y:unicorn.y});
  if(unicorn.trail.length>14) unicorn.trail.pop();
  if(Math.random()<0.005) unicorn.blinkTimer=8;
  if(unicorn.invincible>0) unicorn.invincible--;
  if(unicorn.hitFlash>0) unicorn.hitFlash--;

  sugar=Math.max(0,sugar-0.04);
  health=Math.max(0,health-0.015);

  spawnTimer++;
  if(spawnTimer>=spawnRate){spawnTimer=0;spawnRate=Math.max(40,120-gameTime*0.05);spawnItem();if(items.length>20)items.splice(0,1);}

  hazardTimer++;
  if(hazardTimer>=hazardRate){
    hazardTimer=0;
    hazardRate=Math.max(110,300-gameTime*0.1);
    spawnHazard();
    if(hazards.length>10) hazards.splice(0,1);
  }

  score++;

  items.forEach(item=>{
    item.wobble+=item.wobbleSpeed; item.rotation+=item.rotSpeed;
    if(item.scale<1) item.scale=Math.min(1,item.scale+0.06);
    if(item.collected) return;
    const dx=unicorn.x-item.x,dy=unicorn.y-item.y;
    if(Math.sqrt(dx*dx+dy*dy)<unicorn.size+16){
      item.collected=true;
      if(item.type==='donut'){sugar=Math.min(100,sugar+22);health=Math.min(100,health+5);score+=500;addParticle(item.x,item.y,'#ff80ff',10);addParticle(item.x,item.y,'#ffcc00',6);}
      else if(item.type==='carrot'){sugar=Math.max(0,sugar-18);health=Math.min(100,health+12);score+=300;addParticle(item.x,item.y,'#ff7a00',8);addParticle(item.x,item.y,'#4ade80',5);}
      else{sugar=Math.max(0,sugar-12);health=Math.min(100,health+20);score+=200;addParticle(item.x,item.y,'#4ade80',10);}
    }
  });
  items=items.filter(i=>!i.collected);

  hazards.forEach(h=>{
    h.rotation+=(h.rotSpeed||0.05);
    if(h.type==='comet'){
      h.trail.unshift({x:h.x,y:h.y});
      if(h.trail.length>20) h.trail.pop();
      h.x+=h.vx; h.y+=h.vy;
    } else if(h.type==='bouncer'){
      h.pulseT+=0.13; h.x+=h.vx; h.y+=h.vy;
      if(h.x<h.radius){h.x=h.radius;h.vx=Math.abs(h.vx);addParticle(h.x,h.y,'#ff4444',3);}
      if(h.x>W-h.radius){h.x=W-h.radius;h.vx=-Math.abs(h.vx);addParticle(h.x,h.y,'#ff4444',3);}
      if(h.y<h.radius){h.y=h.radius;h.vy=Math.abs(h.vy);addParticle(h.x,h.y,'#ff4444',3);}
      if(h.y>H-h.radius){h.y=H-h.radius;h.vy=-Math.abs(h.vy);addParticle(h.x,h.y,'#ff4444',3);}
    } else if(h.type==='chaser'){
      h.wobble+=0.07; h.eyeT++;
      const cspd=1.0+gameTime*0.00035;
      const dx=unicorn.x-h.x,dy=unicorn.y-h.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      h.vx=h.vx*0.93+(dx/dist)*cspd*0.07;
      h.vy=h.vy*0.93+(dy/dist)*cspd*0.07;
      h.x+=h.vx; h.y+=h.vy;
    }
    // collision
    if(unicorn.invincible===0){
      const dx=unicorn.x-h.x,dy=unicorn.y-h.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const hr=h.type==='comet'?h.radius*0.85:h.radius*0.82;
      if(dist<unicorn.size*0.72+hr){
        health=Math.max(0,health-25);
        unicorn.invincible=85; unicorn.hitFlash=14;
        addHitSparks(unicorn.x,unicorn.y);
        const ang=Math.atan2(unicorn.y-h.y,unicorn.x-h.x);
        unicorn.vx+=Math.cos(ang)*6; unicorn.vy+=Math.sin(ang)*6;
      }
    }
  });
  hazards=hazards.filter(h=>h.type!=='comet'||(h.x>-80&&h.x<W+80&&h.y>-80&&h.y<H+80));

  if(sugar>=100||health<=0){unicorn.exploding=true;addBigExplosion(unicorn.x,unicorn.y);}

  sugarFill.style.width=sugar+'%';
  sugarFill.style.background=sugar>70?'linear-gradient(90deg,#ff3366,#ff0000)':sugar>40?'linear-gradient(90deg,#ff9900,#ff3366)':'linear-gradient(90deg,#ff6eb4,#ff3366)';
  healthFill.style.width=health+'%';
  healthFill.style.background=health<30?'linear-gradient(90deg,#ef4444,#dc2626)':health<60?'linear-gradient(90deg,#facc15,#22c55e)':'linear-gradient(90deg,#4ade80,#22c55e)';
  scoreEl.textContent='⭐ '+Math.floor(score/10);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.022;p.size*=0.97;});
  particles=particles.filter(p=>p.life>0);
}

function draw(){
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.8);
  bg.addColorStop(0,'#2a0a4a'); bg.addColorStop(1,'#0d0020');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.a+')';ctx.fill();});
  if(state!=='playing'&&state!=='gameover') return;

  // rainbow trail
  if(unicorn.trail.length>2){
    const rcRgb=[[255,0,128],[255,153,0],[255,255,0],[0,255,128],[0,153,255],[204,0,255]];
    unicorn.trail.forEach((pt,i)=>{
      if(i>=unicorn.trail.length-1) return;
      const n=unicorn.trail[i+1], a=(1-i/unicorn.trail.length)*0.5;
      const [r2,g2,b2]=rcRgb[i%rcRgb.length];
      ctx.beginPath(); ctx.moveTo(pt.x,pt.y); ctx.lineTo(n.x,n.y);
      ctx.strokeStyle='rgba('+r2+','+g2+','+b2+','+a+')';
      ctx.lineWidth=(unicorn.trail.length-i)*1.3; ctx.lineCap='round'; ctx.stroke();
    });
  }

  items.forEach(item=>{
    const wy=Math.sin(item.wobble)*4;
    ctx.save(); ctx.translate(item.x,item.y+wy); ctx.scale(item.scale,item.scale);
    if(item.type==='donut') drawDonut(0,0,18,item.rotation);
    else if(item.type==='carrot') drawCarrot(0,0,16,item.rotation);
    else drawSalad(0,0,18,item.rotation);
    ctx.restore();
  });

  // draw hazards
  hazards.forEach(h=>{
    if(h.type==='comet') drawComet(h);
    else if(h.type==='bouncer') drawBouncer(h);
    else drawChaser(h);
  });

  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='star') drawStarShape(p.x,p.y,p.size,p.color,p.life*5);
    else if(p.type==='heart') drawHeart(p.x,p.y,p.size*0.4,p.color);
    else{ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();}
    ctx.globalAlpha=1;
  });

  if(!unicorn.exploding) drawUnicorn(unicorn);

  // hit flash
  if(unicorn.hitFlash>0){
    ctx.save(); ctx.globalAlpha=unicorn.hitFlash/14*0.5;
    ctx.fillStyle='#ff0000'; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  // explosion
  if(unicorn.exploding){
    const t2=unicorn.explodeT/40;
    ctx.save(); ctx.globalAlpha=Math.max(0,1-t2)*0.7;
    const er=t2*180;
    const eg=ctx.createRadialGradient(unicorn.x,unicorn.y,0,unicorn.x,unicorn.y,er);
    eg.addColorStop(0,'rgba(255,255,200,1)'); eg.addColorStop(0.4,'rgba(255,150,0,0.8)'); eg.addColorStop(1,'rgba(255,0,100,0)');
    ctx.beginPath(); ctx.arc(unicorn.x,unicorn.y,er,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill(); ctx.restore();
    if(unicorn.explodeT>20){
      ctx.save(); ctx.globalAlpha=Math.min(1,(unicorn.explodeT-20)/20);
      ctx.font='bold 72px "Fredoka One",cursive'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#ffcc00'; ctx.shadowColor='#ff3366'; ctx.shadowBlur=24;
      ctx.fillText('BUUM!',W/2,H/2-24);
      ctx.font='bold 24px "Nunito",sans-serif'; ctx.fillStyle='#fff'; ctx.shadowBlur=12;
      ctx.fillText(sugar>=100?'Liiga palju sõõrikuid! 🍩':'Sai liiga palju pihta! 💔',W/2,H/2+44);
      ctx.restore();
    }
  }

  if(sugar>75&&!unicorn.exploding){
    ctx.save(); ctx.globalAlpha=0.35+Math.sin(gameTime*0.15)*0.25;
    ctx.fillStyle='rgba(255,0,80,0.1)'; ctx.fillRect(0,0,W,H); ctx.restore();
    ctx.save(); ctx.font='bold 16px "Nunito",sans-serif'; ctx.fillStyle='#ff3366';
    ctx.textAlign='center'; ctx.globalAlpha=0.6+Math.sin(gameTime*0.2)*0.4;
    ctx.shadowColor='#ff0040'; ctx.shadowBlur=8;
    ctx.fillText('⚠️ Söö porgandit! Liiga palju suhkrut!',W/2,28); ctx.restore();
  }
  if(health<30&&!unicorn.exploding){
    ctx.save(); ctx.font='bold 16px "Nunito",sans-serif'; ctx.fillStyle='#4ade80';
    ctx.textAlign='center'; ctx.globalAlpha=0.65+Math.sin(gameTime*0.22)*0.35;
    ctx.shadowColor='#00ff80'; ctx.shadowBlur=8;
    ctx.fillText('💔 Vähe tervist! Söö salatit!',W/2,H-22); ctx.restore();
  }
}

(function menuLoop(){
  if(state==='menu'){
    gameTime++;
    stars.forEach(s=>s.a=0.3+Math.abs(Math.sin(gameTime*s.speed))*0.7);
    const bg2=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.8);
    bg2.addColorStop(0,'#2a0a4a'); bg2.addColorStop(1,'#0d0020');
    ctx.fillStyle=bg2; ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.a+')';ctx.fill();});
    requestAnimationFrame(menuLoop);
  }
})();
</script>
